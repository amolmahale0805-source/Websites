<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <h1>Fill the Details</h1>
    <form action="/submit" method="post">
        <div>
            <label for="image">Upload Image</label>
            <input type="file" id="image" name="image" accept="image/*">

        </div>
        
        <div>
            <label for="username">Username</label>
            <input type="text" id="username" autofocus name="username" placeholder="Enter Username" required>
        </div>
    
        <div>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" pattern="[0-9]" placeholder="Enter the password" required>
        </div>
        
        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter thhe Email" required>
        </div>
        
        <div>
            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female" required>
            <label for="female">Female</label>
        </div>
        
        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="Yes">
            <label for="subscribe">Subscribe to channel</label> 
        </div>
        
        <div>
            <label style="color: red"  for="birthdate">Birtdate</label>
            <input type="date" id="birthdate" name="birthdate" required>
        </div>
        <div>
            <select name="fruits" id="fruits">
                <option>Apple</option>
                <option>Mango</option>
                <option>Cherry</option>
            </select>
                
        </div>
        <div>
            <h5 style="color: green">Enter Your Comments</h5>
            <textarea name="comment" rows="3" cols="50">
                Comment here !!!
            </textarea>


        </div>
        
        <div>
            <input type="submit" value="Submit">
        </div>




    </form>

</body>

</html>
