<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This page abot the card and this created by #Amol">
    <link rel="icon" href="Porsche_911.jpg">
    <title>Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');



        * {
            margin: 0;
            padding: 0;
        }

        .back {
            background-color: #FFFF;
            /* border: 2px solid black; */
            min-height: 600px;
            width: 300px;
            margin: 30px auto;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            box-shadow: 1px 1px 15px grey;
            box-sizing: border-box;


        }



        .imgsize {

            width: 100%;
            height: auto;
            margin: auto;
            display: block;

            box-shadow: 0px 0px 15px white;
            border-radius: 10px;
            box-sizing: border-box;


            top: 5px;
        }


        .figcap {
            margin: auto;
            padding: 20px;
        }

        .lis {
            list-style: none inside;
            display: flex;
            margin: 5px;
            padding: 7px;
            border: 1px solid #878783;
            border-radius: 30px;



        }

        .fulllist {
            display: flex;

        }

        #heading {
            margin: 10px 0px 20px 0px;
            /* text-align: center; */
        }

        #naturecap {
            font-family: 'Poppins', sans-serif;
            line-height: 19px;
            text-align: justify;


        }

        .read {
            margin: 30px auto;
            padding: 10px;
            display: block;
            width: fit-content;


            box-sizing: border-box;
            background-color: rgb(159, 193, 220);
            border: 1px solid rgb(159, 193, 220);
            color: blue;
            border-radius: 18px;
            font-weight: 600;
            font-size: 12px;

        }
    </style>
</head>

<body>
    <div class="back">
        <div class="image">
            <figure>
                <img class="imgsize" src="https://cdn.pixabay.com/photo/2024/03/21/22/36/man-8648609_1280.jpg"
                    alt="Nature image">
                <figcaption class="figcap">
                    <div>
                        <ul class="fulllist">
                            <li class="lis lis1">Nature</li>
                            <li class="lis lis2">Farm</li>
                        </ul>
                    </div>
                    <div>
                        <h1 id="heading">Life in the Heart of Nature</h1>
                    </div>
                    <div id="naturecap">
                        <p>
                            🌿🌾 Nature and farming are the heart of life. Surrounded by green fields and fresh air, we
                            are reminded of the beauty, peace, and simplicity that nature brings. Respect the soil,
                            appreciate the farmer, and protect nature for a better tomorrow. 🌱🍃

                        </p>
                    <div class="read">Read More</div>


                    </div>
                </figcaption>
            </figure>

        </div>
    </div>

</body>

</html>
